name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service api \
            --detach

  deploy-admin:
    name: Deploy Admin to Railway
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Admin
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service admin \
            --detach

  deploy-crypto-watcher:
    name: Deploy Crypto Watcher to Railway
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Crypto Watcher
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service crypto-watcher \
            --detach

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-admin, deploy-crypto-watcher]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ needs.deploy-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: ${{ needs.deploy-admin.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Crypto Watcher: ${{ needs.deploy-crypto-watcher.result }}" >> $GITHUB_STEP_SUMMARY
